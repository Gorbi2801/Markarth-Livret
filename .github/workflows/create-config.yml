name: Build and deploy Pages with generated config

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create scripts/config.js from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASEURL }}
          SUPABASE_KEY: ${{ secrets.SUPABASEKEY }}
          AUTH_EMAIL_DOMAIN: ${{ secrets.AUTHEMAILDOMAIN }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const vm = require('vm');

          const context = { window: {} };
          vm.createContext(context);
          vm.runInContext(fs.readFileSync('scripts/config.example.js', 'utf8'), context);

          const config = {
            ...context.window.GrimoireConfig,
            supabaseUrl: process.env.SUPABASE_URL,
            supabaseKey: process.env.SUPABASE_KEY,
            authEmailDomain: process.env.AUTH_EMAIL_DOMAIN || context.window.GrimoireConfig.authEmailDomain,
          };

          fs.writeFileSync(
            'scripts/config.js',
            `window.GrimoireConfig = Object.freeze(${JSON.stringify(config, null, 2)});\n`
          );
          console.log(`Generated scripts/config.js with sections: ${config.sections.join(', ')}`);
          NODE

      - name: Prepare site directory
        run: |
          rm -rf site
          mkdir site
          # Copy repository files to site/ (exclude workflow files)
          shopt -s dotglob || true
          cp -r ./* site/ || true
          rm -rf site/.github || true
          rm -rf site/.git || true

      - name: List site files
        run: ls -la site | sed -n '1,200p'

      - name: Verify generated config is included
        run: |
          test -f site/scripts/config.js
          echo "site/scripts/config.js is present"

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
